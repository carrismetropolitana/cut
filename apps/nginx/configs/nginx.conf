# Massive thank you to @ricardojorgerm and @tiagogaspar8
# for the help in creating this nginx configuration file.


# # #
# USER

user nginx;


# # #
# WORKER PROCESSES

worker_processes auto;



# # #
# DEFAULTS

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;


# # #
# EVENTS

events {
	use epoll;
	worker_connections 2048;
}


# # #
# HTTP

http {

	# #
	# MIME TYPES

	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	# #
	# LOGS

	log_format main '$time_iso8601 | $status [$upstream_cache_status] | IP $remote_addr | Request: "$request" | Referrer: "$http_referrer" | User Agent: "$http_user_agent"';

	access_log /var/log/nginx/access.log main buffer=32k flush=3s;


	# #
	# FILE DESCRIPTOR SETTINGS

	aio on;
	directio 512;
	sendfile on;
	tcp_nopush on;

	keepalive_timeout 65;


	# # #
	# CLOUDFLARE TRUSTED IPS

	include cloudflare.conf;


	# # #
	# RATE LIMITS

	limit_req_zone global zone=global:10m rate=500r/s;
	limit_req zone=global burst=200 delay=30;

	limit_req_zone $remote_addr zone=ip:10m rate=100r/s;
	limit_req zone=ip burst=50 delay=30;

	limit_req_status 429;


	# # #
	# COMPRESSION

	gzip on;
	gzip_types application/json;



	# # # # # # # # # # # # # # # # # # # # # #
	# # # FRONTEND


	# # #
	# CACHE

	proxy_cache_path /var/cache/nginx/default levels=1:2 keys_zone=default:512m inactive=360m;

	map $http_rsc $normalized_rsc_header {
		# Apply a normalization to the RSC header used to identify
		# react-server-components payloads in the proxy_cache_key.
		# This map function is used to prevent amplification by junk values.
		# It checks if the RSC header is equal to 1. If it is, then it sets
		# the $normalized_rsc_header variable to "_rsc". If it is not, then
		# it sets the variable to an empty string.
		"1" "_rsc";
		default "";
	}


	# # #
	# UPSTREAM

	upstream backoffice_upstream {
		zone upstreams 64K;
		server backoffice:3000 max_fails=1 fail_timeout=2s;
		keepalive 10;
	}

	upstream frontend_upstream {
		zone upstreams 64K;
		server frontend:3000 max_fails=1 fail_timeout=2s;
		keepalive 10;
	}


	# # #
	# DEFAULT HTTP SERVER
	# Redirect to HTTPS

	server {

		listen 80;
		listen [::]:80;
		server_name ${PRIMARY_DOMAIN};
		server_tokens off;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		if ($host != '${PRIMARY_DOMAIN}') {
			return 302 http://${PRIMARY_DOMAIN}$request_uri;
		}

		location / {
			return 301 https://$host$request_uri;
		}

	}


	# # #
	# HTTPS SERVER

	server {

		listen 443 ssl default_server;
		listen [::]:443 ssl default_server;
		server_name ${PRIMARY_DOMAIN};
		server_tokens off;
		http2 on;

		# Lets Encrypt Certificates
		ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;
		include /etc/letsencrypt/options-ssl-nginx.conf;
		ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
		ssl_early_data on;

		# Enforce host
		if ($host != '${PRIMARY_DOMAIN}') {
			return 302 https://${PRIMARY_DOMAIN}$request_uri;
		}

		# Do not skip cache by default
		set $skip_cache 0;
		set $skip_reason "";

		# Skip cache if Uptime Monitor
		include uptime.conf;

		# Cache configuration
		etag on;
		proxy_cache_key "$scheme$request_method$host$uri|$normalized_rsc_header";
		proxy_cache default;
		proxy_cache_valid 200 60s;
		proxy_cache_valid 404 5m;
		proxy_cache_lock on;
		proxy_cache_lock_age 30s;
		proxy_cache_lock_timeout 90s;
		proxy_cache_use_stale error timeout updating;
		proxy_cache_revalidate on;
		proxy_cache_background_update on;
		proxy_cache_bypass $skip_cache;

		# Proxy configuration
		proxy_http_version 1.1;
		proxy_connect_timeout 10s;
		proxy_send_timeout 20s;
		proxy_read_timeout 20s;
		proxy_set_header Connection "";
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $host;
		proxy_next_upstream error timeout http_500;

		# Set default headers
		add_header CMET-Cache-Skip $skip_reason;
		add_header CMET-Cache-Status $upstream_cache_status;
		add_header Strict-Transport-Security "max-age=31536000" always;


		# # #
		# BACKOFFICE
		# This location is used to serve the 'backoffice' Payload application.
		# It is used to serve the admin interface of the application as well as
		# all API routes that come default with the application.

		location /admin {
			# Disable cache for the admin interface
			expires off;
			# Connect to upstream
			proxy_pass http://backoffice_upstream;
		}


		# # #
		# BACKOFFICE PUBLIC API
		# This location is used to serve the public API of the 'backoffice' Payload application.
		# These are specially configured API routes that return cacheable responses intended
		# to be used by the frontend application. These routes have their own cache control
		# headers set in the upstream responses, so we do not set any cache control here.

		location /admin/public-api {
			# Connect to upstream
			proxy_pass http://backoffice_upstream;
		}


		# # #
		# DEFAULT LOCATION
		# This location is used to serve the 'frontend' NextJS application.
		# All remaining requests that are not handled by the above locations
		# will be handled by this one.

		location / {
			# Connect to upstream
			proxy_pass http://frontend_upstream;
		}


	}

}